<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="联系我们 - 元核智算工作室">
  <title>联系我们 | Meta-Kernel Lab</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .nav-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: var(--z-index-nav);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1024px;
      margin: 0 auto;
      padding: 0 var(--spacing-lg);
      height: 48px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-weight: 600;
      font-size: 1.125rem;
      text-decoration: none;
      color: var(--color-text);
    }

    .nav-logo svg {
      width: 28px;
      height: 28px;
    }

    .nav-links {
      display: flex;
      gap: var(--spacing-xl);
      list-style: none;
    }

    .nav-links a {
      color: var(--color-text);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 400;
      transition: color 0.3s var(--transition-smooth);
      opacity: 0.8;
    }

    .nav-links a:hover {
      opacity: 1;
      color: var(--color-accent);
    }

    .nav-links a.active {
      opacity: 1;
      color: var(--color-accent);
    }

    .nav-menu-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: var(--spacing-sm);
    }

    @media (max-width: 768px) {
      .nav-links {
        position: fixed;
        top: 48px;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        flex-direction: column;
        padding: var(--spacing-lg);
        transform: translateY(-100%);
        opacity: 0;
        transition: all 0.4s var(--transition-smooth);
        pointer-events: none;
        align-items: center;
      }

      .nav-links.active {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .nav-menu-toggle {
        display: block;
      }
    }

    .hero {
      padding: 160px var(--spacing-lg) 80px;
      text-align: center;
      background: linear-gradient(180deg, #FAFAFA 0%, #FFFFFF 100%);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(0, 113, 227, 0.06);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-accent);
      margin-bottom: var(--spacing-lg);
    }

    .hero-title {
      font-size: clamp(36px, 5vw, 52px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: var(--spacing-md);
    }

    .hero-description {
      font-size: clamp(16px, 2vw, 19px);
      color: var(--color-text-secondary);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .contact-section {
      padding: 60px 0 80px;
    }

    .contact-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 var(--spacing-xl);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
    }

    .contact-info h2 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      background: #FAFAFA;
      border-radius: 16px;
      transition: all 0.3s var(--transition-smooth);
    }

    .contact-item:hover {
      background: #F5F5F7;
      transform: translateX(4px);
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #0071E3 0%, #5E5CE6 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 24px;
      height: 24px;
      stroke: white;
      fill: none;
    }

    .contact-content h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .contact-content p {
      font-size: 14px;
      color: var(--color-text-secondary);
      line-height: 1.6;
    }

    .contact-content a {
      color: var(--color-accent);
      text-decoration: none;
      transition: opacity 0.3s;
    }

    .contact-content a:hover {
      opacity: 0.8;
    }

    .social-links {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    .social-link {
      width: 48px;
      height: 48px;
      background: #FAFAFA;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s var(--transition-smooth);
      text-decoration: none;
    }

    .social-link:hover {
      background: var(--color-accent);
      transform: translateY(-4px);
    }

    .social-link:hover svg {
      stroke: white;
    }

    .social-link svg {
      width: 24px;
      height: 24px;
      stroke: var(--color-text);
      fill: none;
    }

    .contact-form-wrapper h2 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    .contact-form {
      background: #FAFAFA;
      border-radius: 20px;
      padding: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--color-text);
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      font-family: var(--font-main);
      font-size: 15px;
      color: var(--color-text);
      background: #FFFFFF;
      transition: all 0.3s var(--transition-smooth);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
    }

    .form-input::placeholder {
      color: var(--color-text-secondary);
      opacity: 0.6;
    }

    textarea.form-input {
      min-height: 120px;
      resize: vertical;
    }

    .form-submit {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
    }

    .map-section {
      padding: 0 0 80px;
    }

    .map-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 var(--spacing-xl);
    }

    .map-wrapper {
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(145deg, #F8F8FA 0%, #F0F0F2 100%);
      aspect-ratio: 21/9;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .map-placeholder {
      text-align: center;
    }

    .map-placeholder svg {
      width: 48px;
      height: 48px;
      stroke: var(--color-text-secondary);
      fill: none;
      opacity: 0.4;
      margin-bottom: 12px;
    }

    .map-placeholder p {
      font-size: 14px;
      color: var(--color-text-secondary);
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .map-wrapper {
        aspect-ratio: 4/3;
      }
    }

    .footer {
      padding: 48px 0;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      background: #FAFAFA;
    }

    .footer-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--spacing-lg);
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 var(--spacing-xl);
    }

    .footer-info {
      font-size: 13px;
      color: var(--color-text-secondary);
    }

    .footer-links {
      display: flex;
      gap: var(--spacing-xl);
    }

    .footer-links a {
      font-size: 13px;
      color: var(--color-text-secondary);
      text-decoration: none;
      transition: color 0.3s var(--transition-smooth);
    }

    .footer-links a:hover {
      color: var(--color-accent);
    }

    @media (max-width: 768px) {
      .footer-content {
        flex-direction: column;
        text-align: center;
      }
    }

    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s var(--transition-smooth), transform 0.6s var(--transition-smooth);
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

  <script>
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');

    menuToggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
    });

    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const scrollPercent = (scrollTop / docHeight) * 100;
      document.getElementById('progressBar').style.width = scrollPercent + '%';
    });

    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -50px 0px'
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, observerOptions);

    document.querySelectorAll('.fade-in').forEach(el => {
      observer.observe(el);
    });

    document.getElementById('contactForm').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('感谢您的留言！我们会尽快回复您。');
      e.target.reset();
    });
  </script>
